<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Clock</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0f">

  <!-- iOS home-screen app -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Clock">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <style>
    :root {
      --bg: #0a0a0f;
      --fg: #f5f5f7;
      --accent: #5b9dff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh; /* dynamic viewport: avoids iOS toolbar jump */
      overflow: hidden;
      cursor: default;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
      transition: background 0.4s ease, color 0.4s ease;
    }
    body.light {
      --bg: #f5f5f7;
      --fg: #15151a;
      --accent: #2563eb;
    }

    /* ---------- Clock ---------- */
    #clock { display: flex; flex-direction: column; align-items: center; }
    #time {
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.02em;
      line-height: 1;
      font-size: clamp(3rem, 18vw, 22rem);
      white-space: nowrap;
    }
    #ampm {
      color: var(--accent);
      font-size: 0.4em;
      vertical-align: baseline;
      margin-left: 0.15em;
      font-weight: 600;
    }
    #date { margin-top: 0.5rem; font-size: clamp(1rem, 4vw, 2.5rem); font-weight: 400; opacity: 0.65; }
    #zone { margin-top: 0.4rem; font-size: clamp(0.75rem, 2.2vw, 1.25rem); font-weight: 400; opacity: 0.4; letter-spacing: 0.05em; }

    /* ---------- Timer displays ---------- */
    .timer-digits { font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; line-height: 1; white-space: nowrap; }

    /* Replace-mode: big centered countdown (clock hidden) */
    #timerReplace { display: none; flex-direction: column; align-items: center; }
    #timerReplace .timer-digits { font-size: clamp(3rem, 18vw, 22rem); color: var(--fg); }
    #timerReplace .timer-label { margin-top: 0.5rem; font-size: clamp(0.9rem, 3vw, 1.6rem); opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Corner stack: large numbers bottom-left, below the clock (timer + stopwatch coexist) */
    #cornerStack {
      position: fixed;
      left: max(1.5rem, env(safe-area-inset-left));
      bottom: max(1.5rem, env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 1.2rem;
    }
    #timerCorner { display: none; flex-direction: column; align-items: flex-start; }
    /* Stopwatch lives in its own bottom-right corner */
    #swCorner {
      display: none;
      position: fixed;
      right: max(1.5rem, env(safe-area-inset-right));
      bottom: max(1.5rem, env(safe-area-inset-bottom));
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
    }
    #timerCorner .timer-digits, #swCorner .timer-digits { font-size: clamp(2.5rem, 13vw, 11rem); }
    #timerCorner .timer-digits { color: var(--accent); }
    #swCorner .timer-digits { color: var(--fg); }
    #timerCorner .timer-label, #swCorner .timer-label { font-size: clamp(0.7rem, 2vw, 1.1rem); opacity: 0.45; letter-spacing: 0.1em; text-transform: uppercase; }

    /* Stopwatch replace-mode (centered, like the timer's) */
    #swReplace { display: none; flex-direction: column; align-items: center; }
    #swReplace .timer-digits { font-size: clamp(3rem, 18vw, 22rem); color: var(--fg); }
    #swReplace .timer-label { margin-top: 0.5rem; font-size: clamp(0.9rem, 3vw, 1.6rem); opacity: 0.4; letter-spacing: 0.1em; text-transform: uppercase; }

    body.mode-replace #clock, body.sw-replace #clock { display: none; }
    body.mode-replace #timerReplace { display: flex; }
    body.mode-corner #timerCorner { display: flex; }
    body.sw-replace #swReplace { display: flex; }
    body.sw-corner #swCorner { display: flex; }

    body.paused #timerReplace .timer-digits,
    body.paused #timerCorner .timer-digits,
    body.sw-paused #swReplace .timer-digits,
    body.sw-paused #swCorner .timer-digits { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0.35; } }

    /* Alarm */
    body.timer-done { animation: flash 0.7s ease-in-out infinite; }
    @keyframes flash {
      0%, 100% { background: var(--bg); }
      50% { background: var(--accent); }
    }

    /* ---------- Controls ---------- */
    #toolbar {
      position: fixed;
      top: max(0.9rem, env(safe-area-inset-top));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.5rem;
      align-items: center;
      opacity: 0.28;
      transition: opacity 0.25s ease;
      z-index: 10;
    }
    #toolbar:hover, #toolbar:focus-within, #toolbar.show { opacity: 1; }
    .btn {
      font: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--fg);
      background: color-mix(in srgb, var(--fg) 10%, transparent);
      border: 1px solid color-mix(in srgb, var(--fg) 22%, transparent);
      border-radius: 999px;
      padding: 0.5rem 1rem;
      cursor: pointer;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.15s ease, transform 0.05s ease;
    }
    .btn:hover { background: color-mix(in srgb, var(--fg) 18%, transparent); }
    .btn:active { transform: scale(0.96); }
    .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
    .btn[hidden] { display: none; }

    /* Setup panel */
    #panel, #tpPanel, #swPanel {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: min(92vw, 420px);
      background: color-mix(in srgb, var(--bg) 82%, var(--fg));
      border: 1px solid color-mix(in srgb, var(--fg) 18%, transparent);
      border-radius: 20px;
      padding: 1.25rem;
      box-shadow: 0 24px 60px rgba(0,0,0,0.45);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 20;
    }
    #panel[hidden], #tpPanel[hidden], #swPanel[hidden] { display: none; }
    #panel h2, #tpPanel h2, #swPanel h2 { font-size: 1.05rem; margin-bottom: 0.9rem; font-weight: 700; }
    .row { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.9rem; }
    .preset { flex: 1 1 28%; min-width: 64px; text-align: center; padding: 0.6rem 0; }
    .field-label { font-size: 0.78rem; opacity: 0.55; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.4rem; }
    #customTime {
      font: inherit; font-size: 1.4rem; font-weight: 600; font-variant-numeric: tabular-nums;
      width: 100%; text-align: center;
      color: var(--fg); background: color-mix(in srgb, var(--fg) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--fg) 20%, transparent);
      border-radius: 12px; padding: 0.6rem;
    }
    .seg { display: flex; gap: 0.3rem; background: color-mix(in srgb, var(--fg) 8%, transparent); border-radius: 12px; padding: 0.3rem; }
    .seg button { flex: 1; border: none; background: transparent; color: var(--fg); font: inherit; font-weight: 600; padding: 0.55rem; border-radius: 9px; cursor: pointer; opacity: 0.6; }
    .seg button.active { background: var(--accent); color: #fff; opacity: 1; }
    .panel-actions { display: flex; gap: 0.5rem; margin-top: 0.4rem; }
    .panel-actions .btn { flex: 1; justify-content: center; text-align: center; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 15; }
    .overlay[hidden] { display: none; }

    /* ---------- Teleprompter ---------- */
    body.tp-active #clock,
    body.tp-active #timerReplace,
    body.tp-active #swReplace,
    body.tp-active #cornerStack,
    body.tp-active #swCorner,
    body.tp-active #toolbar { display: none !important; }
    #tpView { position: fixed; inset: 0; overflow: hidden; display: none; z-index: 5; }
    body.tp-active #tpView { display: block; }
    #tpScroller { will-change: transform; }
    #tpText {
      max-width: min(90vw, 1100px); margin: 0 auto;
      padding: 90vh 1rem 60vh; color: var(--fg);
      font-size: 6vw; line-height: 1.45; font-weight: 600;
      text-align: center; white-space: pre-wrap; word-break: break-word;
    }
    #tpText.mirror { transform: scaleX(-1); }
    body.tp-active::after {
      content: ""; position: fixed; left: 0; right: 0; top: 50%;
      border-top: 2px solid var(--accent); opacity: 0.22; pointer-events: none; z-index: 6;
    }
    #tpControls {
      position: fixed; left: 50%; transform: translateX(-50%);
      bottom: max(1rem, env(safe-area-inset-bottom));
      display: none; gap: 0.35rem; align-items: center; z-index: 12;
      opacity: 0.3; transition: opacity 0.25s ease;
      background: color-mix(in srgb, var(--bg) 65%, transparent);
      padding: 0.4rem; border-radius: 999px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      max-width: 96vw; flex-wrap: wrap; justify-content: center;
    }
    body.tp-active #tpControls { display: flex; }
    #tpControls:hover, #tpControls.show { opacity: 1; }
    #tpControls .btn { padding: 0.5rem 0.7rem; font-size: 0.9rem; }
    #tpReadout { font-variant-numeric: tabular-nums; font-size: 0.8rem; opacity: 0.7; min-width: 3em; text-align: center; }
    textarea#tpInput {
      font: inherit; width: 100%; min-height: 130px; resize: vertical;
      color: var(--fg); background: color-mix(in srgb, var(--fg) 8%, transparent);
      border: 1px solid color-mix(in srgb, var(--fg) 20%, transparent);
      border-radius: 12px; padding: 0.6rem;
    }
    #tpFile { font: inherit; color: var(--fg); max-width: 100%; }
  </style>
</head>
<body>
  <div id="clock">
    <div id="time">--:--:--</div>
    <div id="date"></div>
    <div id="zone"></div>
  </div>

  <!-- Replace-mode timer (centered) -->
  <div id="timerReplace">
    <div class="timer-digits">0:00</div>
    <div class="timer-label">Timer</div>
  </div>

  <!-- Stopwatch replace-mode (centered) -->
  <div id="swReplace">
    <div class="timer-digits">0:00</div>
    <div class="timer-label">Elapsed</div>
  </div>

  <!-- Bottom-left: timer -->
  <div id="cornerStack">
    <div id="timerCorner">
      <div class="timer-label">Timer</div>
      <div class="timer-digits">0:00</div>
    </div>
  </div>

  <!-- Bottom-right: stopwatch -->
  <div id="swCorner">
    <div class="timer-label">Elapsed</div>
    <div class="timer-digits">0:00</div>
  </div>

  <!-- Teleprompter -->
  <div id="tpView"><div id="tpScroller"><div id="tpText"></div></div></div>

  <!-- Toolbar -->
  <div id="toolbar">
    <button class="btn" id="timerBtn">Timer</button>
    <button class="btn" id="swBtn">Stopwatch</button>
    <button class="btn" id="scriptBtn">Script</button>
    <button class="btn" id="pauseBtn" hidden>Pause</button>
    <button class="btn" id="addBtn" hidden>+1:00</button>
    <button class="btn" id="stopBtn" hidden>Stop</button>
    <button class="btn" id="swPauseBtn" hidden>⏱ Pause</button>
    <button class="btn" id="swResetBtn" hidden>⏱ Reset</button>
    <button class="btn" id="swStopBtn" hidden>⏱ End</button>
  </div>

  <!-- Setup panel -->
  <div class="overlay" id="overlay" hidden></div>
  <div id="panel" hidden role="dialog" aria-label="Timer setup">
    <h2>Set a timer</h2>
    <div class="field-label">Quick presets</div>
    <div class="row" id="presets">
      <button class="btn preset" data-sec="60">1 min</button>
      <button class="btn preset" data-sec="180">3 min</button>
      <button class="btn preset" data-sec="300">5 min</button>
      <button class="btn preset" data-sec="600">10 min</button>
      <button class="btn preset" data-sec="900">15 min</button>
      <button class="btn preset" data-sec="1500">25 min</button>
    </div>
    <div class="field-label">Custom (mm:ss or minutes)</div>
    <div class="row"><input id="customTime" type="text" inputmode="numeric" placeholder="e.g. 5:00 or 90"></div>
    <div class="field-label">Display</div>
    <div class="row">
      <div class="seg" id="modeSeg" style="width:100%">
        <button data-mode="replace">Replace clock</button>
        <button data-mode="corner">Below, bottom-left</button>
      </div>
    </div>
    <div class="panel-actions">
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="startBtn">Start</button>
    </div>
  </div>

  <!-- Stopwatch setup -->
  <div id="swPanel" hidden role="dialog" aria-label="Stopwatch">
    <h2>Start stopwatch</h2>
    <div class="field-label">Where should it show?</div>
    <div class="row">
      <button class="btn preset" data-swmode="replace" style="flex:1">Replace clock</button>
      <button class="btn preset" data-swmode="corner" style="flex:1">Below, bottom-right</button>
    </div>
    <div class="panel-actions">
      <button class="btn" id="swCancel">Cancel</button>
    </div>
  </div>

  <!-- Teleprompter controls -->
  <div id="tpControls">
    <button class="btn" id="tpSlower">– spd</button>
    <button class="btn" id="tpPlay">▶︎</button>
    <button class="btn" id="tpFaster">+ spd</button>
    <span id="tpReadout"></span>
    <button class="btn" id="tpFontDown">A−</button>
    <button class="btn" id="tpFontUp">A+</button>
    <button class="btn" id="tpRestart">⟲</button>
    <button class="btn" id="tpMirror">Mirror</button>
    <button class="btn" id="tpExit">Exit</button>
  </div>

  <!-- Teleprompter setup -->
  <div id="tpPanel" hidden role="dialog" aria-label="Teleprompter">
    <h2>Teleprompter</h2>
    <div class="field-label">Paste your script</div>
    <div class="row"><textarea id="tpInput" placeholder="Paste or type your script here…"></textarea></div>
    <div class="field-label">…or upload a .txt file</div>
    <div class="row"><input type="file" id="tpFile" accept=".txt,text/plain"></div>
    <div class="panel-actions">
      <button class="btn" id="tpClear">Clear</button>
      <button class="btn" id="tpCancel">Cancel</button>
      <button class="btn primary" id="tpStart">Start</button>
    </div>
  </div>

  <script>
    /* ============== CLOCK ============== */
    const timeEl = document.getElementById('time');
    const dateEl = document.getElementById('date');
    const zoneEl = document.getElementById('zone');

    let use24h = localStorage.getItem('use24h');
    if (use24h === null) {
      use24h = !new Intl.DateTimeFormat([], { hour: 'numeric' })
        .formatToParts(new Date()).some(p => p.type === 'dayPeriod');
    } else { use24h = use24h === 'true'; }
    if (localStorage.getItem('theme') === 'light') document.body.classList.add('light');

    const pad = n => String(n).padStart(2, '0');

    function renderClock() {
      const now = new Date();
      let h = now.getHours();
      const m = pad(now.getMinutes());
      const s = pad(now.getSeconds());
      if (!use24h) {
        const period = h < 12 ? 'AM' : 'PM';
        h = h % 12 || 12;
        timeEl.innerHTML = `${h}:${m}:${s}<span id="ampm">${period}</span>`;
      } else {
        timeEl.textContent = `${pad(h)}:${m}:${s}`;
      }
      dateEl.textContent = now.toLocaleDateString([], { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
      const tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      const tzAbbr = (now.toLocaleTimeString([], { timeZoneName: 'short' }).split(' ').pop()) || '';
      zoneEl.textContent = tz ? `${tz} (${tzAbbr})` : tzAbbr;
    }
    function clockTick() { renderClock(); setTimeout(clockTick, 1000 - (Date.now() % 1000)); }
    clockTick();
    document.addEventListener('visibilitychange', () => { if (!document.hidden) { renderClock(); renderTimer(); swRender(); } });

    /* ============== TIMER ============== */
    const replaceDigits = document.querySelector('#timerReplace .timer-digits');
    const cornerDigits = document.querySelector('#timerCorner .timer-digits');
    const timerBtn = document.getElementById('timerBtn');
    const scriptBtn = document.getElementById('scriptBtn');
    const pauseBtn = document.getElementById('pauseBtn');
    const addBtn = document.getElementById('addBtn');
    const stopBtn = document.getElementById('stopBtn');
    const panel = document.getElementById('panel');
    const overlay = document.getElementById('overlay');
    const customTime = document.getElementById('customTime');
    const modeSeg = document.getElementById('modeSeg');

    let mode = localStorage.getItem('timerMode') || 'replace';   // 'replace' | 'corner'
    const timer = { state: 'idle', endTime: 0, remaining: 0, total: 0 };  // idle|running|paused|done
    let audioCtx = null;

    function fmt(ms) {
      let s = Math.max(0, Math.ceil(ms / 1000));
      const h = Math.floor(s / 3600); s %= 3600;
      const m = Math.floor(s / 60); const ss = s % 60;
      return h > 0 ? `${h}:${pad(m)}:${pad(ss)}` : `${pad(m)}:${pad(ss)}`;
    }

    function applyLayout() {
      const active = timer.state !== 'idle';
      document.body.classList.toggle('mode-replace', active && mode === 'replace');
      document.body.classList.toggle('mode-corner', active && mode === 'corner');
      document.body.classList.toggle('paused', timer.state === 'paused');
      // toolbar buttons
      timerBtn.hidden = active;
      scriptBtn.hidden = active;
      pauseBtn.hidden = !(timer.state === 'running' || timer.state === 'paused');
      addBtn.hidden = !(timer.state === 'running' || timer.state === 'paused');
      stopBtn.hidden = !active;
      pauseBtn.textContent = timer.state === 'paused' ? 'Resume' : 'Pause';
    }

    function renderTimer() {
      let ms;
      if (timer.state === 'running') ms = timer.endTime - Date.now();
      else if (timer.state === 'paused') ms = timer.remaining;
      else if (timer.state === 'done') ms = 0;
      else return;
      const text = fmt(ms);
      replaceDigits.textContent = text;
      cornerDigits.textContent = text;
    }

    let timerInterval = null;
    function timerLoop() {
      if (timer.state !== 'running') return;
      if (timer.endTime - Date.now() <= 0) { finishTimer(); return; }
      renderTimer();
    }
    function startInterval() {
      clearInterval(timerInterval);
      timerInterval = setInterval(timerLoop, 200);
    }

    function ensureAudio() {
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
      } catch (e) {}
    }
    function beep(when, freq) {
      if (!audioCtx) return;
      const t = audioCtx.currentTime + when;
      const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
      o.connect(g); g.connect(audioCtx.destination);
      o.type = 'sine'; o.frequency.value = freq || 880;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.45);
      o.start(t); o.stop(t + 0.5);
    }

    function startTimer(seconds) {
      if (!seconds || seconds <= 0) return;
      ensureAudio();
      timer.total = seconds * 1000;
      timer.remaining = timer.total;
      timer.endTime = Date.now() + timer.total;
      timer.state = 'running';
      document.body.classList.remove('timer-done');
      applyLayout(); renderTimer(); startInterval();
      closePanel();
    }
    function pauseResume() {
      if (timer.state === 'running') {
        timer.remaining = Math.max(0, timer.endTime - Date.now());
        timer.state = 'paused';
      } else if (timer.state === 'paused') {
        timer.endTime = Date.now() + timer.remaining;
        timer.state = 'running';
        startInterval();
      } else { return; }
      applyLayout(); renderTimer();
    }
    function addMinute() {
      if (timer.state === 'running') timer.endTime += 60000;
      else if (timer.state === 'paused') timer.remaining += 60000;
      else return;
      renderTimer();
    }
    function stopTimer() {
      clearInterval(timerInterval);
      timer.state = 'idle';
      document.body.classList.remove('timer-done');
      document.title = 'Clock';
      applyLayout();
    }
    function finishTimer() {
      clearInterval(timerInterval);
      timer.state = 'done';
      renderTimer();
      applyLayout();
      document.title = "⏰ Time's up";
      document.body.classList.add('timer-done');
      ensureAudio();
      [0, 0.6, 1.2].forEach(t => beep(t, 880));
      if (navigator.vibrate) navigator.vibrate([300, 150, 300, 150, 300]);
    }

    /* ----- Panel ----- */
    function openPanel() {
      modeSeg.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      panel.hidden = false; overlay.hidden = false;
      ensureAudio(); // unlock audio on this user gesture
    }
    function closePanel() { panel.hidden = true; overlay.hidden = true; }
    function closeAllPanels() { panel.hidden = true; closeTpPanel(); swPanel.hidden = true; overlay.hidden = true; }

    function parseCustom(v) {
      v = (v || '').trim();
      if (!v) return 0;
      if (v.includes(':')) {
        const parts = v.split(':').map(x => parseInt(x, 10) || 0);
        if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
        return parts[0] * 60 + (parts[1] || 0);
      }
      return Math.round(parseFloat(v) * 60); // bare number = minutes
    }

    /* ----- Events ----- */
    const toolbar = document.getElementById('toolbar');
    toolbar.addEventListener('click', e => e.stopPropagation());
    panel.addEventListener('click', e => e.stopPropagation());

    timerBtn.addEventListener('click', openPanel);
    pauseBtn.addEventListener('click', pauseResume);
    addBtn.addEventListener('click', addMinute);
    stopBtn.addEventListener('click', stopTimer);
    document.getElementById('cancelBtn').addEventListener('click', closePanel);
    overlay.addEventListener('click', closeAllPanels);

    document.getElementById('presets').addEventListener('click', e => {
      const b = e.target.closest('.preset'); if (!b) return;
      startTimer(parseInt(b.dataset.sec, 10));
    });
    document.getElementById('startBtn').addEventListener('click', () => {
      const sec = parseCustom(customTime.value);
      if (sec > 0) startTimer(sec);
      else customTime.focus();
    });
    customTime.addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('startBtn').click(); });
    modeSeg.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      mode = b.dataset.mode;
      localStorage.setItem('timerMode', mode);
      modeSeg.querySelectorAll('button').forEach(x => x.classList.toggle('active', x === b));
      applyLayout(); renderTimer();
    });

    /* ============== GLOBAL GESTURES ============== */
    let lastTap = 0;
    document.body.addEventListener('click', () => {
      if (tp.active) return;                 // teleprompter handles its own taps
      // While the alarm is ringing, any tap dismisses it
      if (timer.state === 'done') { stopTimer(); return; }
      const now = Date.now();
      if (now - lastTap < 300) {                 // double => fullscreen
        if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
        else document.exitFullscreen?.();
      } else {                                    // single => theme toggle
        document.body.classList.toggle('light');
        localStorage.setItem('theme', document.body.classList.contains('light') ? 'light' : 'dark');
      }
      lastTap = now;
    });

    document.addEventListener('keydown', e => {
      if (e.target === customTime) return;
      const k = e.key.toLowerCase();
      if (k === 't') {
        use24h = !use24h; localStorage.setItem('use24h', String(use24h)); renderClock();
      } else if (k === ' ') {                     // space: pause/resume
        if (tp.active) { e.preventDefault(); tpTogglePlay(); }
        else if (timer.state === 'running' || timer.state === 'paused') { e.preventDefault(); pauseResume(); }
      } else if (k === 'escape') {
        if (!panel.hidden || !tpPanel.hidden || !swPanel.hidden) closeAllPanels();
        else if (tp.active) tpExit();
        else if (timer.state !== 'idle') stopTimer();
        // (deliberately does NOT end the stopwatch — use its End button)
      } else if (tp.active && (k === 'arrowup' || k === 'arrowdown')) {
        e.preventDefault();
        tp.speed = k === 'arrowup' ? Math.min(400, tp.speed + 10) : Math.max(10, tp.speed - 10);
        localStorage.setItem('tpSpeed', tp.speed); tpApplyStyle();
      }
    });

    // Reveal the toolbar briefly on load so it's discoverable, then fade
    toolbar.classList.add('show');
    setTimeout(() => toolbar.classList.remove('show'), 2600);

    /* ============== STOPWATCH ============== */
    const swBtn = document.getElementById('swBtn');
    const swPauseBtn = document.getElementById('swPauseBtn');
    const swResetBtn = document.getElementById('swResetBtn');
    const swStopBtn = document.getElementById('swStopBtn');
    const swPanel = document.getElementById('swPanel');
    const swReplaceDigits = document.querySelector('#swReplace .timer-digits');
    const swCornerDigits = document.querySelector('#swCorner .timer-digits');

    // Anchored to a wall-clock start timestamp and persisted, so a page
    // reload (or phone lock) mid-stream never loses the elapsed time.
    const sw = { state: 'idle', startEpoch: 0, accum: 0 };
    let swMode = localStorage.getItem('swMode') || 'corner';
    let swInterval = null;

    function swSave() {
      localStorage.setItem('sw', JSON.stringify({ state: sw.state, startEpoch: sw.startEpoch, accum: sw.accum }));
    }
    function swElapsed() {
      return sw.state === 'running' ? sw.accum + (Date.now() - sw.startEpoch) : sw.accum;
    }
    function swFmt(ms) {
      let s = Math.max(0, Math.floor(ms / 1000));
      const h = Math.floor(s / 3600); s %= 3600;
      const m = Math.floor(s / 60); const ss = s % 60;
      return h > 0 ? `${h}:${pad(m)}:${pad(ss)}` : `${pad(m)}:${pad(ss)}`;
    }
    function swRender() {
      if (sw.state === 'idle') return;
      const text = swFmt(swElapsed());
      swReplaceDigits.textContent = text;
      swCornerDigits.textContent = text;
    }
    function swApplyLayout() {
      const active = sw.state !== 'idle';
      document.body.classList.toggle('sw-replace', active && swMode === 'replace');
      document.body.classList.toggle('sw-corner', active && swMode === 'corner');
      document.body.classList.toggle('sw-paused', sw.state === 'paused');
      swBtn.hidden = active;
      swPauseBtn.hidden = !active;
      swResetBtn.hidden = !active;
      swStopBtn.hidden = !active;
      swPauseBtn.textContent = sw.state === 'paused' ? '⏱ Resume' : '⏱ Pause';
    }
    function swStartInterval() {
      clearInterval(swInterval);
      swInterval = setInterval(swRender, 500);
    }
    function swStart(mode) {
      swMode = mode;
      localStorage.setItem('swMode', mode);
      sw.state = 'running'; sw.startEpoch = Date.now(); sw.accum = 0;
      swSave(); swApplyLayout(); swRender(); swStartInterval();
      closeAllPanels();
    }
    function swPauseResume() {
      if (sw.state === 'running') {
        sw.accum += Date.now() - sw.startEpoch;
        sw.state = 'paused';
        clearInterval(swInterval);
      } else if (sw.state === 'paused') {
        sw.startEpoch = Date.now();
        sw.state = 'running';
        swStartInterval();
      } else { return; }
      swSave(); swApplyLayout(); swRender();
    }
    function swReset() {
      sw.accum = 0; sw.startEpoch = Date.now();
      swSave(); swRender();
    }
    function swEnd() {
      clearInterval(swInterval);
      sw.state = 'idle'; sw.accum = 0;
      swSave(); swApplyLayout();
    }

    swBtn.addEventListener('click', () => {
      panel.hidden = true; tpPanel.hidden = true;
      swPanel.hidden = false; overlay.hidden = false;
    });
    document.getElementById('swCancel').addEventListener('click', closeAllPanels);
    swPanel.addEventListener('click', e => {
      e.stopPropagation();
      const b = e.target.closest('[data-swmode]'); if (!b) return;
      swStart(b.dataset.swmode);
    });
    swPauseBtn.addEventListener('click', swPauseResume);
    swResetBtn.addEventListener('click', swReset);
    swStopBtn.addEventListener('click', swEnd);

    // Restore a stopwatch that was running when the page was last closed/reloaded
    (function swRestore() {
      try {
        const saved = JSON.parse(localStorage.getItem('sw') || 'null');
        if (saved && (saved.state === 'running' || saved.state === 'paused')) {
          sw.state = saved.state; sw.startEpoch = saved.startEpoch; sw.accum = saved.accum;
          swApplyLayout(); swRender();
          if (sw.state === 'running') swStartInterval();
        }
      } catch (e) {}
    })();

    /* ============== TELEPROMPTER ============== */
    const tpPanel = document.getElementById('tpPanel');
    const tpInput = document.getElementById('tpInput');
    const tpFile = document.getElementById('tpFile');
    const tpView = document.getElementById('tpView');
    const tpScroller = document.getElementById('tpScroller');
    const tpText = document.getElementById('tpText');
    const tpControls = document.getElementById('tpControls');
    const tpPlay = document.getElementById('tpPlay');
    const tpReadout = document.getElementById('tpReadout');
    const tpMirrorBtn = document.getElementById('tpMirror');

    const tp = {
      active: false, playing: false, offset: 0, last: 0, raf: 0,
      speed: parseFloat(localStorage.getItem('tpSpeed')) || 60,   // px / second
      size: parseFloat(localStorage.getItem('tpSize')) || 6,      // vw
      mirror: localStorage.getItem('tpMirror') === 'true'
    };

    function tpApplyStyle() {
      tpText.style.fontSize = tp.size + 'vw';
      tpText.classList.toggle('mirror', tp.mirror);
      tpMirrorBtn.classList.toggle('primary', tp.mirror);
      tpReadout.textContent = Math.round(tp.speed) + '/s';
    }
    function tpRender() { tpScroller.style.transform = `translateY(${-tp.offset}px)`; }
    function tpUpdatePlayBtn() { tpPlay.textContent = tp.playing ? '❚❚' : '▶︎'; }
    function tpTogglePlay() { tp.playing = !tp.playing; tpUpdatePlayBtn(); }

    function tpLoop(ts) {
      if (!tp.active) return;
      if (!tp.last) tp.last = ts;
      const dt = (ts - tp.last) / 1000; tp.last = ts;
      if (tp.playing) {
        tp.offset += tp.speed * dt;
        const max = Math.max(0, tpText.scrollHeight - window.innerHeight * 0.5);
        if (tp.offset >= max) { tp.offset = max; tp.playing = false; tpUpdatePlayBtn(); }
        tpRender();
      }
      tp.raf = requestAnimationFrame(tpLoop);
    }

    function openTpPanel() {
      panel.hidden = true;
      if (!tpInput.value) tpInput.value = localStorage.getItem('tpScript') || '';
      tpPanel.hidden = false; overlay.hidden = false;
    }
    function closeTpPanel() { tpPanel.hidden = true; }

    function startTp() {
      const text = tpInput.value.replace(/\r\n/g, '\n');
      if (!text.trim()) { tpInput.focus(); return; }
      localStorage.setItem('tpScript', text);
      tpText.textContent = text;
      tp.active = true; tp.playing = true; tp.offset = 0; tp.last = 0;
      document.body.classList.add('tp-active');
      tpApplyStyle(); tpRender(); tpUpdatePlayBtn();
      closeAllPanels();
      cancelAnimationFrame(tp.raf);
      tp.raf = requestAnimationFrame(tpLoop);
      tpControls.classList.add('show');
      setTimeout(() => tpControls.classList.remove('show'), 2800);
    }
    function tpExit() {
      tp.active = false; tp.playing = false;
      cancelAnimationFrame(tp.raf); tp.last = 0;
      document.body.classList.remove('tp-active');
    }

    scriptBtn.addEventListener('click', openTpPanel);
    document.getElementById('tpClear').addEventListener('click', () => {
      tpInput.value = '';
      tpFile.value = '';
      tpText.textContent = '';
      localStorage.removeItem('tpScript');
      tpInput.focus();
    });
    document.getElementById('tpCancel').addEventListener('click', closeAllPanels);
    document.getElementById('tpStart').addEventListener('click', startTp);
    tpFile.addEventListener('change', () => {
      const f = tpFile.files && tpFile.files[0]; if (!f) return;
      const r = new FileReader();
      r.onload = () => { tpInput.value = String(r.result || ''); };
      r.readAsText(f);
    });
    tpControls.addEventListener('click', e => e.stopPropagation());
    tpView.addEventListener('click', () => {
      tpControls.classList.add('show');
      setTimeout(() => tpControls.classList.remove('show'), 2200);
      tpTogglePlay();
    });
    tpPlay.addEventListener('click', tpTogglePlay);
    document.getElementById('tpFaster').addEventListener('click', () => { tp.speed = Math.min(400, tp.speed + 10); localStorage.setItem('tpSpeed', tp.speed); tpApplyStyle(); });
    document.getElementById('tpSlower').addEventListener('click', () => { tp.speed = Math.max(10, tp.speed - 10); localStorage.setItem('tpSpeed', tp.speed); tpApplyStyle(); });
    document.getElementById('tpFontUp').addEventListener('click', () => { tp.size = Math.min(14, tp.size + 0.5); localStorage.setItem('tpSize', tp.size); tpApplyStyle(); });
    document.getElementById('tpFontDown').addEventListener('click', () => { tp.size = Math.max(3, tp.size - 0.5); localStorage.setItem('tpSize', tp.size); tpApplyStyle(); });
    document.getElementById('tpRestart').addEventListener('click', () => { tp.offset = 0; tpRender(); tp.playing = true; tpUpdatePlayBtn(); });
    tpMirrorBtn.addEventListener('click', () => { tp.mirror = !tp.mirror; localStorage.setItem('tpMirror', String(tp.mirror)); tpApplyStyle(); });
    document.getElementById('tpExit').addEventListener('click', tpExit);

    /* ============== SERVICE WORKER ============== */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('service-worker.js').catch(() => {}));
    }
  </script>
</body>
</html>
